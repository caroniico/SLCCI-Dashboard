    default_buffer_km: 50.0
    
  bering_strait_pass2:
    name: "Bering Strait Pass 2"
    file: "bering strait gate.shp"
    file_dir: "/Users/nicolocaron/Desktop/ARCFRESH/BERING STRAIT GATE"
