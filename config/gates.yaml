# Region groupings for UI
regions:
  atlantic_sector:
    name: "Atlantic Sector"
    gates: ["fram_strait", "fram_strait_west", "fram_strait_east", "denmark_strait", "davis_strait", "davis_strait_east", "davis_strait_west", "barents_opening", "norwegian_boundary"]
    
  pacific_sector:
